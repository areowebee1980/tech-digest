<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Digest</title>
<style>
  :root {
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --text: #1D1D1F;
    --meta: #86868B;
    --accent: #9C8A5C;
    --border: #E5E5E5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* ---- Day section ---- */
  .day {
    margin-bottom: 56px;
  }

  .day-date {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 28px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .day:first-of-type .day-date {
    font-size: 32px;
  }

  /* ---- Category group ---- */
  .category {
    margin-bottom: 28px;
  }

  .category-label {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    margin: 0 0 12px;
  }

  /* ---- Card grid ---- */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  @media (min-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card h3 {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .card p {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    margin: 0;
    opacity: 0.85;
  }

  .card a {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    margin-top: 4px;
  }

  .card a:hover { text-decoration: underline; }

  /* ---- Empty / placeholder state ---- */
  .empty-note {
    font-size: 14px;
    color: var(--meta);
    font-style: italic;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="day">
    <h1 class="day-date">Welcome</h1>
    <p class="empty-note">Your first digest will appear here after the next scheduled run.</p>
  </div>

</div>
</body>
</html>
